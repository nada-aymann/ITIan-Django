{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Login</button>
    <p>Don't have an account? <a href="{% url 'register' %}">Register Now</a></p>
</form>
{%endblock%}
