{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<h1>Register</h1>
<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    <button type="submit" class="btn">Register</button>
    <p>Already have an account? <a href="{% url 'login' %}">Login Now</a></p>
</form>
{%endblock%}
